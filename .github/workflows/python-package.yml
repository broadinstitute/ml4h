name: Test ml4h Python package

on:
  workflow_dispatch:
  push:
    branches: [ rr_test ]
  pull_request:
    branches: [ rr_test ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip   # cache wheel downloads to speed up installs

      - name: Show Python
        run: |
          python --version

      # Keep pip tooling recent (no legacy resolver issues), but don't pin hard
      - name: Upgrade pip tooling
        run: |
          python -m pip install -U pip wheel

      # --- YOUR RULE: install exactly what you listed, don't resolve deps ---
      # If you also keep a requirements file, we'll install it first with --no-deps.
      - name: Install listed requirements without dependency resolution (if present)
        run: |
          if [ -f "requirements.txt" ]; then
            echo "Installing requirements.txt with --no-deps"
            python -m pip install --no-deps -r requirements.txt
          else
            echo "No requirements.txt found; skipping."
          fi

      # Install your package *without* pulling any of its dependencies.
      - name: Install ml4h package without deps
        run: |
          python -m pip install --no-deps .

      # --- Add ONLY missing dependencies, leave existing versions untouched ---
      # We scan installed packages' Requires-Dist and install names that are missing.
      # We intentionally ignore version pins and never uninstall anything.
      - name: Add missing dependencies (ignore versions, don’t change existing)
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import sys, subprocess, re, shlex, os
          try:
              from importlib.metadata import distributions
          except Exception:
              from importlib_metadata import distributions  # py3.7 backport if needed

          def norm(req: str) -> str:
              # Strip version specifiers, markers, extras, and environment markers
              # Examples: "numpy>=1.24; python_version<'3.12'" -> "numpy"
              name = re.split(r"[;,(<>=\[]", req.strip())[0]
              # handle extras like "package[extra]"
              name = re.split(r"\[", name)[0]
              return name.strip().lower()

          def installed_set():
              s = set()
              for d in distributions():
                  try:
                      n = d.metadata["Name"]
                  except Exception:
                      n = None
                  if n:
                      s.add(n.lower())
              return s

          # Bounded passes to catch shallow transitive gaps without risking loops
          max_passes = 3
          for i in range(max_passes):
              installed = installed_set()
              needed = set()
              for d in distributions():
                  meta = d.metadata
                  if not meta:
                      continue
                  for r in (meta.get_all("Requires-Dist") or []):
                      name = norm(r)
                      if name and name not in installed:
                          needed.add(name)
              if not needed:
                  print(f"No missing dependencies after pass {i}.")
                  break
              print(f"Pass {i}: installing {len(needed)} missing dependency names:", ", ".join(sorted(needed)))
              # Install by names only, no deps, and prefer wheels to stay fast.
              cmd = [sys.executable, "-m", "pip", "install", "--no-deps", "--prefer-binary", *sorted(needed)]
              print("Running:", " ".join(shlex.quote(c) for c in cmd))
              subprocess.check_call(cmd)
          else:
              print("Finished maximum passes.")
          PY

      # Optional: show potential conflicts but do NOT fail the job on them
      - name: Report potential dependency issues (non-fatal)
        run: |
          python -m pip check || true

      - name: Test with pytest and pytest-xdist
        run: |
          python -m pip install -U pytest pytest-xdist
          pytest tests -m "not slow" -n auto
