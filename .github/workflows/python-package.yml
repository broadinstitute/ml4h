name: Test ml4h Python package

on:
  workflow_dispatch:
  push:
    branches: [ rr_test ]
  pull_request:
    branches: [ rr_test ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Show Python
        run: python --version

      - name: Upgrade pip tooling
        run: |
          python -m pip install -U pip setuptools wheel

      # Create a constraints file that *forces* a wheel-only PyYAML >=6
      - name: Write constraints
        run: |
          echo "PyYAML>=6,<7" > constraints.txt

      # Preinstall PyYAML wheel so it's already satisfied before resolving ml4h deps
      - name: Preinstall PyYAML wheel
        env:
          PIP_ONLY_BINARY: ":all:"
        run: |
          python -m pip install -c constraints.txt PyYAML

      # Install your package with the same constraint + prefer wheels for all deps
      - name: Install package with constraints (prefer wheels)
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install -c constraints.txt --prefer-binary .

      - name: Run tests
        run: |
          python -m pip install -U pytest pytest-xdist
          pytest tests -m "not slow" -n auto
