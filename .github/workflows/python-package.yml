name: Test ml4h Python package

on:
  workflow_dispatch:
  push:
    branches: [ rr_test ]
  pull_request:
    branches: [ rr_test ]

# This workflow will install the ml4h Python package and run its tests.
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions


jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        architecture: 'x64'     # explicit 64-bit
        
    - name: Show Python
      run: |
          python --version
          python -c "import struct, platform; print('bitness', struct.calcsize('P')*8, 'arch', platform.machine())"

    - name: Install dependencies
      run: |
        #pip cache purge
        python -m pip install --upgrade pip
        
        echo 'Cython < 3.0' > constraints.txt
        PIP_CONSTRAINT=constraints.txt pip install 'PyYAML==5.4.1'
        # Install the ml4h Python package.
        pip install .
    - name: Test with pytest and pytest-xdist
      run: |
        pytest tests -m "not slow" -n auto
