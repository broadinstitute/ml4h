name: Test ml4h Python package

on:
  workflow_dispatch:
  push:
    branches: [ rr_test ]
  pull_request:
    branches: [ rr_test ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Show Python
        run: python --version

      - name: Upgrade pip tooling
        run: |
          python -m pip install -U pip setuptools wheel

      # Avoid building old PyYAML (5.4.1) from source — force a modern wheel (6.x)
      - name: Preinstall PyYAML wheel (avoid sdist build)
        run: |
          python -m pip install --only-binary=:all: "PyYAML>=6,<7"

      - name: Install package
        run: |
          python -m pip install --prefer-binary .

      - name: Run tests
        run: |
          python -m pip install -U pytest pytest-xdist
          pytest tests -m "not slow" -n auto
